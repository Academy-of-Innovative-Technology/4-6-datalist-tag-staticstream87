<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>4.6 datalist tags</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <!--example form with a datalist-->
  <form name="example" action="#" method="POST">
      <label for="language">Select or type a language:</label>
      <input list="languages" name="language">
      <datalist id="languages">
          <option value="English">
          <option value="Spanish">
          <option value="Bangla">
          <option value="Chinese">
      </datalist>
      <br><br>
      <input type="submit">
  </form>

  <!--exercise 1-->
 <form name="sneakers" action="#" method="POST">

    <option value="nike">
    <options value="sketchers">

 </form>
 

  <!--exercise 2-->
<form name="cities" action="#" method="POST">
  <label for="city">pick a type of city</label>
  <input list="cities" name="city">

    </form>

<form name="OLVER-TREE " action="#" method="POST">

</body>

</html>
